<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Halo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="halo state-thinking" id="halo">
      <svg class="halo-ring" viewBox="0 0 100 100" aria-hidden="true">
        <circle class="halo-arc halo-arc-shadow" cx="50" cy="50" r="40"></circle>
        <circle class="halo-arc halo-arc-main" cx="50" cy="50" r="40"></circle>
      </svg>
      <section class="halo-core" aria-live="polite">
        <div class="halo-text">
          <div class="state-zh" id="stateZh">思考</div>
          <div class="state-en" id="stateEn">Thinking</div>
          <div class="state-hint" id="stateHint">正在思考</div>
        </div>
      </section>
    </main>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
